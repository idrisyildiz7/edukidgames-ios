name: EduKidGames
options:
  bundleIdPrefix: com.edukidgames
  developmentLanguage: tr
  deploymentTarget:
    iOS: "16.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 11.0.0
targets:
  EduKidGames:
    type: application
    platform: iOS
    sources:
      - EduKidGames
    resources:
      - EduKidGames/Resources
      - EduKidGames/GoogleService-Info.plist
    entitlements:
      path: EduKidGames/EduKidGames.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseMessaging
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.edukidgames.app
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.0"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ZDR75MUR47
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_CFBundleDisplayName: EduKid Games
    info:
      path: EduKidGames/Info.plist
      properties:
        CFBundleDevelopmentRegion: tr
        CFBundleLocalizations:
          - tr
          - en
        UIAppFonts:
          - Fonts/Fredoka.ttf
          - Fonts/Nunito.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
